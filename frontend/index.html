<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Management App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="auth-section card" id="authSection">
      <h1>Task Management App</h1>
      <p class="subtitle">Login or register to manage your tasks</p>

      <div class="tabs">
        <button class="tab-btn active" id="showLogin">Login</button>
        <button class="tab-btn" id="showRegister">Register</button>
      </div>

      <form id="loginForm" class="form">
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="primary-btn">Login</button>
      </form>

      <form id="registerForm" class="form hidden">
        <input type="text" id="registerName" placeholder="Full Name" required />
        <input type="email" id="registerEmail" placeholder="Email" required />
        <input type="password" id="registerPassword" placeholder="Password" required />
        <select id="registerRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
        <button type="submit" class="primary-btn">Register</button>
      </form>

      <p id="authMessage" class="message"></p>
    </div>

    <div class="dashboard hidden" id="dashboard">
      <div class="topbar card">
        <div>
          <h2>My Tasks</h2>
          <p id="welcomeText">Welcome</p>
        </div>
        <button id="logoutBtn" class="danger-btn">Logout</button>
      </div>

      <div class="task-form-section card">
        <h3>Add New Task</h3>
        <form id="taskForm" class="form">
          <input type="text" id="taskTitle" placeholder="Task Title" required />
          <textarea id="taskDescription" placeholder="Task Description"></textarea>
          <div class="row">
            <select id="taskStatus">
              <option value="Pending">Pending</option>
              <option value="Completed">Completed</option>
            </select>
            <select id="taskPriority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
            <input type="date" id="taskDueDate" />
          </div>
          <button type="submit" class="primary-btn">Add Task</button>
        </form>
      </div>

      <div class="task-list-section card">
        <div class="task-list-header">
          <h3>Task List</h3>
          <button id="refreshBtn" class="secondary-btn">Refresh</button>
        </div>
        <div id="taskList" class="task-list"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
